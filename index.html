<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dear 姨媽</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <h1 class="title">Dear 姨媽</h1>
    <p class="subtitle">Turn on the volume for a sweet surprise ✨🔊</p>

    <section class="video-wrap" id="videoWrap" aria-hidden="true">
      <video id="birthdayVideo" class="birthday-video" src="assets/birthday.mp4" playsinline></video>
    </section>

    <button class="envelope" id="envelope" aria-label="Open envelope">
      <span class="envelope__back"></span>
      <span class="envelope__paper"></span>
      <span class="envelope__front"></span>
      <span class="envelope__flap"></span>
      <img class="click-arrow" src="assets/click_me.png" alt="Click me" />
    </button>
  </main>

  <script src="script.js"></script>
</body>
</html>
