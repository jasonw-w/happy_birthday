<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <section class="video-wrap" id="videoWrap" aria-hidden="true">
      <video id="birthdayVideo" class="birthday-video" src="assets/birthday.mp4" playsinline></video>
    </section>

    <button class="envelope" id="envelope" aria-label="Open envelope">
      <span class="envelope__back"></span>
      <span class="envelope__paper"></span>
      <span class="envelope__front"></span>
      <span class="envelope__flap"></span>
    </button>
  </main>

  <script src="script.js"></script>
</body>
</html>
